<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Listing Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --leb-font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;

            /* ── Brand / Primary Palette ── */
            --leb-primary-color: #F15E74;
            /* Coral red – buttons, accents */
            --leb-primary-dark: #e8445e;
            /* Darker variant for gradients */
            --leb-primary-glow: rgba(241, 94, 116, 0.25);
            /* Box-shadow tint */
            --leb-primary-light-bg: #ffe6ea;
            /* Soft red for focus rings */

            /* ── Secondary / Surface ── */
            --leb-secondary-color: #2C3E50;
            /* Dark blue-grey – headings */
            --leb-bg-light: #FAFAFA;
            /* Page background */
            --leb-white: #ffffff;

            /* ── Semantic Status Colors ── */
            --leb-success-color: #16a34a;
            --leb-success-light-bg: #d5ffe5;
            --leb-warning-color: #f59e0b;
            --leb-warning-light-bg: #fff2dc;
            --leb-error-color: #ea0124;
            --leb-error-light-bg: #ffe6ea;
            --leb-info-color: #2563eb;
            --leb-info-light-bg: #dbeafe;

            /* ── Text ── */
            --leb-text-color: #000000;
            --leb-text-muted: #5a6e7c;
            /* Soft grey for secondary text */

            /* ── Borders ── */
            --leb-border-color: #e9eef3;
            /* Light border */
            --leb-border-default: #e2e8f0;
            /* Slightly darker border */

            /* ── Shadows ── */
            --leb-card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            --leb-focus-shadow: 0 0 0 4px var(--leb-primary-light-bg);

            /* ── Alpha / Transparency ── */
            --leb-overlay-bg: rgba(255, 255, 255, 0.75);
            --leb-overlay-dark: rgba(0, 0, 0, 0.15);
            /* Darker backdrop for modals */
            --leb-white-alpha-40: rgba(255, 255, 255, 0.4);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--leb-font-main);
            background-color: var(--leb-bg-light);
        }

        .lef-db {
            max-width: 1200px;
            margin: 2rem auto;
            width: 96%;
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 2rem;
        }

        .lef-db-header {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            gap: 1rem;
            background-color: var(--leb-white);
            border-radius: 1rem;
            border: solid 1px var(--leb-border-color);
            box-shadow: var(--leb-card-shadow);
            padding: 0.8rem;
        }

        .lef-db-header .svg-cont {
            display: flex;
            background-color: var(--leb-primary-color);
            padding: 0.9rem;
            border-radius: 1rem;
        }

        .lef-db-header .svg-cont svg {
            width: 24px;
            height: 24px;
            color: var(--leb-white);
        }

        .lef-db-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--leb-secondary-color);
        }

        .lef-db-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem 1rem;
        }

        .lef-db-card {
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            align-items: flex-start;
            justify-content: flex-start;
            background-color: var(--leb-white);
            border-radius: 1rem;
            border: solid 1px var(--leb-border-color);
            box-shadow: var(--leb-card-shadow);
            padding: 1rem;
            gap: 1rem;
        }

        .lef-db-card h2.card-title {
            font-size: 1.2rem;
            font-weight: 550;
        }

        .lef-db-card .statuses {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            gap: 0.6rem;
            color: var(--leb-text-muted);
            font-size: 0.9rem;
        }

        .lef-db-card .status-row {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            gap: 1rem;
        }

        .lef-db-card span.status-label {
            min-width: 110px;
        }

        .lef-db-card .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 12px;
            border-radius: 100rem;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid transparent;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .lef-db-card .badge--success {
            background-color: var(--leb-success-light-bg);
            color: var(--leb-success-color);
            border-color: var(--leb-success-color);
        }

        .lef-db-card .actions {
            width: 100%;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding-top: 0.7rem;
            border-top: 1px solid var(--leb-border-color);
            margin-top: 2px;
        }

        .lef-db-card .actions .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 16px;
            border-radius: 100rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .lef-db-card .actions .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .lef-db-card .actions .btn svg {
            width: 14px;
            height: 14px;
        }

        .lef-db-card .actions .btn-refresh {
            background: var(--leb-bg-light);
            border-color: var(--leb-border-default);
            color: var(--leb-secondary-color);
        }

        .lef-db-card .actions .btn-repair {
            background: var(--leb-primary-color);
            border-color: var(--leb-primary-color);
            color: var(--leb-white);
            box-shadow: 0 4px 10px var(--leb-primary-glow);
        }

        @media (max-width: 950px) {
            .lef-db-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 650px) {

            .lef-db {
                gap: 1rem;
            }

            .lef-db-header .svg-cont {
                width: 45px;
                height: 45px;
                padding: 0.75rem;
            }

            .lef-db-header .svg-cont svg {
                width: auto;
                height: auto;
            }

            .lef-db-header h1 {
                font-size: 1.5rem;
            }

            .lef-db-grid {
                grid-template-columns: repeat(1, 1fr);
                gap: 1rem;
            }
        }

        @media (max-width: 380px) {
            .lef-db-header .svg-cont {
                width: 40px;
                height: 40px;
                padding: 0.6rem;
            }

            .lef-db-header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <div class="lef-db">
        <div class="lef-db-header">
            <div class="svg-cont">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                </svg>
            </div>
            <h1 class="heading">Database Management</h1>
        </div>

        <div class="lef-db-grid">
            <div class="lef-db-card">
                <h2 class="card-title">Reservation Table</h2>

                <div class="statuses">
                    <div class="status-row">
                        <span class="status-label">Table Created:</span>
                        <span class="badge badge--success">✓ Yes</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Rows Complete:</span>
                        <span class="badge badge--success">✓ All Present</span>
                    </div>
                </div>

                <div class="actions">
                    <!-- Refresh button -->
                    <button class="btn btn-refresh">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                        <span class="btn-label">Refresh</span>
                    </button>

                    <!-- Create/Repair button -->
                    <button class="btn btn-repair">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span class="btn-label">Create / Repair</span>
                    </button>
                </div>
            </div>

            <div class="lef-db-card">
                <h2 class="card-title">Reservation Table</h2>

                <div class="statuses">
                    <div class="status-row">
                        <span class="status-label">Table Created:</span>
                        <span class="badge badge--success">✓ Yes</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Rows Complete:</span>
                        <span class="badge badge--success">✓ All Present</span>
                    </div>
                </div>

                <div class="actions">
                    <!-- Refresh button -->
                    <button class="btn btn-refresh">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                        <span class="btn-label">Refresh</span>
                    </button>

                    <!-- Create/Repair button -->
                    <button class="btn btn-repair">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span class="btn-label">Create / Repair</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
