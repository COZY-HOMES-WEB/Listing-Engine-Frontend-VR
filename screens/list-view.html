<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property in Delhi | Stayfinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --sf-primary: #FF385C;
            --sf-primary-dark: #E31E4F;
            --sf-primary-light: #FF5A5F;
            --sf-secondary: #222222;
            --sf-text: #222222;
            --sf-text-light: #717171;
            --sf-text-lighter: #B0B0B0;
            --sf-border: #DDDDDD;
            --sf-bg: #FFFFFF;
            --sf-bg-light: #F7F7F7;
            --sf-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.08);
            --sf-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            --sf-shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.16);
            --sf-radius: 12px;
            --sf-radius-lg: 24px;
            --sf-transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--sf-bg-light);
            color: var(--sf-text);
            line-height: 1.5;
            min-height: 100vh;
        }




        /* Main Content */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 48px 64px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--sf-text);
        }

        .view-options {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .view-btn {
            padding: 8px 16px;
            border: 1px solid var(--sf-border);
            background: var(--sf-bg);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-btn:hover {
            border-color: var(--sf-text);
        }

        .view-btn.active {
            background: var(--sf-secondary);
            color: white;
            border-color: var(--sf-secondary);
        }

        .view-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Property Grid */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .property-card {
            overflow: hidden;
            cursor: pointer;
        }

        .property-card:hover .card-image {
            transform: scale(1.03);
        }

        .card-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: var(--sf-radius-lg);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--sf-bg);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: clamp(10px, 1.2vw, 12px);
            font-weight: 600;
            box-shadow: var(--sf-shadow-sm);
        }

        .card-badge.guest-favorite {
            background: var(--sf-primary);
            color: white;
        }

        .property-bedroom {
            font-size: clamp(12px, 1.2vw, 14px);
            color: var(--sf-text-light);
            margin-top: 4px;
        }

        .property-rating.new {
            color: var(--sf-text-light);
        }

        .favorite-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .favorite-btn:hover {
            transform: scale(1.1);
            background: var(--sf-bg);
        }

        .favorite-btn.active svg {
            fill: var(--sf-primary);
            stroke: var(--sf-primary);
        }

        .favorite-btn svg {
            width: 22px;
            height: 22px;
            stroke: var(--sf-text);
            stroke-width: 2;
            fill: none;
            transition: all 0.2s;
        }

        .image-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s;
            box-shadow: var(--sf-shadow);
            z-index: 2;
        }

        .image-nav-btn:hover {
            background: var(--sf-bg);
            transform: translateY(-50%) scale(1.1);
        }

        .image-nav-btn svg {
            width: 14px;
            height: 14px;
            stroke: var(--sf-text);
            stroke-width: 2.5;
        }

        .image-nav-btn.prev {
            left: 12px;
        }

        .image-nav-btn.next {
            right: 12px;
        }

        .card-image-container:hover .image-nav-btn {
            opacity: 1;
        }

        .image-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            z-index: 2;
        }

        .image-dot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transition: all 0.2s;
        }

        .image-dot.active {
            background: var(--sf-bg);
            transform: scale(1.2);
        }

        .card-image-container:hover .image-dot {
            opacity: 1;
        }

        .card-body {
            padding: 12px 4px 8px;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .property-name {
            font-size: clamp(12px, 1.4vw, 15px);
            font-weight: 600;
            color: var(--sf-text);
            line-height: 1.3;
            flex: 1;
            min-width: 0;
        }

        .property-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: clamp(12px, 1.2vw, 14px);
            font-weight: 500;
            white-space: nowrap;
        }

        .property-rating svg {
            width: 12px;
            height: 12px;
            fill: var(--sf-text);
        }

        .property-price {
            display: flex;
            align-items: baseline;
            gap: 4px;
            margin-top: 4px;
        }

        .price-amount {
            font-size: clamp(13px, 1.4vw, 16px);
            font-weight: 600;
            color: var(--sf-text);
        }

        .price-period {
            font-size: clamp(11px, 1.1vw, 14px);
            color: var(--sf-text-light);
        }

        /* Loading */
        .loading-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 48px;
            gap: 12px;
        }

        .loading-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--sf-border);
            border-top-color: var(--sf-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--sf-text-light);
            font-size: 14px;
        }

        /* Footer */
        .footer {
            background: var(--sf-bg);
            border-top: 1px solid var(--sf-border);
            padding: 48px;
            margin-top: 48px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 48px;
        }

        .footer-col h4 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            color: var(--sf-text);
        }

        .footer-col ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-col a {
            color: var(--sf-text-light);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .footer-col a:hover {
            color: var(--sf-text);
        }

        .footer-bottom {
            max-width: 1400px;
            margin: 32px auto 0;
            padding-top: 24px;
            border-top: 1px solid var(--sf-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--sf-text-light);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .property-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .property-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .main, .footer {
                padding-left: 20px;
                padding-right: 20px;
            }
        }

        @media (max-width: 600px) {
            .property-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            .main {
                padding: 20px 12px 40px;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .section-title {
                font-size: 18px;
            }
            
            .property-name {
                font-size: 13px;
            }
            
            .property-bedroom {
                font-size: 12px;
            }
            
            .price-amount {
                font-size: 14px;
            }
            
            .price-period {
                font-size: 12px;
            }
            
            .card-badge {
                font-size: 10px;
                padding: 4px 8px;
            }
            
            .favorite-btn {
                width: 30px;
                height: 30px;
            }
            
            .favorite-btn svg {
                width: 16px;
                height: 16px;
            }
            
            .footer-content {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
            
            .footer-bottom {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }

        @media (max-width: 400px) {
            .property-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .main {
                padding: 16px 12px 32px;
            }
            
            .section-title {
                font-size: 16px;
            }
            
            .footer-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .footer {
                padding: 32px 16px;
            }
            
            .footer-col h4 {
                font-size: 12px;
            }
            
            .footer-col a {
                font-size: 13px;
            }
        }
    </style>
</head>

        function createPropertyCard(prop) {

            card.className = 'property-card';

            const images = prop.images || [prop.image];

                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>

                </button>
            ` : '';

            const dotsHTML = showNav ? `<div class="image-dots">${images.map((_, i) => `<span class="image-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></span>`).join('')}</div>` : '';

            card.innerHTML = `
                <div class="card-image-container" data-images='${JSON.stringify(images)}' data-current="0">
                    <img src="${images[0]}" alt="${prop.title}" class="card-image" loading="lazy">
                    ${badgeHTML}
                    ${navButtonsHTML}
                    ${dotsHTML}
                    <button class="favorite-btn" onclick="toggleFavorite(event)" aria-label="Add to favorites">
                        <svg viewBox="0 0 24 24">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
                <div class="card-body">
                    <div class="card-header">
                        <h3 class="property-name">${prop.title}</h3>
                        ${ratingHTML}
                    </div>
                    <p class="property-bedroom">${prop.bedroom}</p>
                    <div class="property-price">
                        <span class="price-amount">${prop.price}</span>
                        <span class="price-period">/ night</span>
                    </div>
                </div>
            `;
            return card;
        }

        function changeImage(event, title, direction) {
            event.stopPropagation();
            const container = event.target.closest('.card-image-container');
            const images = JSON.parse(container.dataset.images);
            let current = parseInt(container.dataset.current);
            current = (current + direction + images.length) % images.length;
            container.dataset.current = current;
            container.querySelector('.card-image').src = images[current];
            container.querySelectorAll('.image-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === current);
            });
        }

        function loadMore() {
            const fragment = document.createDocumentFragment();
            const itemsToShow = properties.slice(visibleCount, visibleCount + batchSize);

            itemsToShow.forEach(prop => {
                fragment.appendChild(createPropertyCard(prop));
            });

            grid.appendChild(fragment);
            visibleCount += itemsToShow.length;

            if (visibleCount >= properties.length) {
                loadingIndicator.style.display = 'none';
            }
        }

        function toggleFavorite(event) {
            event.stopPropagation();
            const btn = event.currentTarget;
            btn.classList.toggle('active');
        }

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                if (chip.querySelector('svg')) return;
                chip.classList.toggle('active');
            });
        });

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && visibleCount < properties.length) {
                loadMore();
            }
        }, { rootMargin: '200px' });

        observer.observe(loadingIndicator);
    </script>
</body>

</html>
